<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>St. Paul Coptic Orthodox Church — AV Control</title>
  <base href="/">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet" href="css/styles.css?v=26089">
</head>
<body>

  <!-- =========================================================
       STATUS BAR
       ========================================================= -->
  <header id="status-bar">
    <div id="status-left" class="status-section">
      <button id="mobile-menu-toggle" class="mobile-only" aria-label="Menu">
        <span class="material-icons">menu</span>
      </button>
      <span id="version-label">v1.0.0</span>
      <div id="status-health" class="status-section">
        <span class="health-badge health-down" id="health-down-count" title="Down">0</span>
        <span class="health-badge health-warning" id="health-warning-count" title="Warning">0</span>
        <span class="health-badge health-healthy" id="health-healthy-count" title="Healthy">0</span>
      </div>
    </div>

    <div id="status-center" class="status-section">
      <span id="tablet-name">Tablet</span>
      <span>&ndash;</span>
      <span id="connection-status" class="status-indicator">Connecting…</span>
    </div>

    <div id="status-right" class="status-section">
      <button id="notif-bell" title="Notifications" class="notif-bell-btn">
        <span class="material-icons">notifications</span>
        <span id="notif-badge" class="notif-badge hidden">0</span>
      </button>
      <button id="theme-toggle" title="Toggle light/dark mode">
        <span class="material-icons">dark_mode</span>
      </button>
      <div id="user-menu-wrapper" style="display:none;position:relative;">
        <button id="user-menu-btn" title="User menu" style="background:none;border:none;color:inherit;cursor:pointer;padding:4px;">
          <span class="material-icons" style="font-size:20px;">account_circle</span>
        </button>
        <div id="user-menu-dropdown" class="user-menu-dropdown">
          <div id="user-menu-name" class="user-menu-name"></div>
          <button id="user-change-pw-btn" class="user-menu-item">
            <span class="material-icons" style="font-size:18px;">lock</span> Change Password
          </button>
          <button id="user-signout-btn" class="user-menu-item" onclick="window.location.href='/logout'">
            <span class="material-icons" style="font-size:18px;">logout</span> Sign Out
          </button>
        </div>
      </div>
      <span id="clock"></span>
    </div>
  </header>

  <!-- =========================================================
       NOTIFICATION PANEL
       ========================================================= -->
  <div id="notif-overlay" class="notif-overlay hidden"></div>
  <aside id="notif-panel" class="notif-panel">
    <div class="notif-panel-header">
      <h3>Notifications</h3>
      <button id="notif-clear" class="notif-clear-btn" title="Clear all">
        <span class="material-icons">delete_sweep</span>
      </button>
    </div>
    <div id="notif-list" class="notif-list">
      <div class="notif-empty">No notifications</div>
    </div>
  </aside>

  <!-- =========================================================
       MAIN CONTENT AREA
       ========================================================= -->
  <main id="page-content"></main>

  <!-- =========================================================
       PIN ENTRY OVERLAY
       ========================================================= -->
  <div id="pin-overlay" class="overlay hidden">
    <div id="pin-modal" class="modal">
      <button id="pin-close" class="modal-close" aria-label="Close">
        <span class="material-icons">close</span>
      </button>

      <h2 id="pin-title">Enter PIN</h2>

      <div id="pin-display">
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
      </div>

      <div id="pin-keypad" class="pin-keypad">
        <button class="pin-key" data-key="1">1</button>
        <button class="pin-key" data-key="2">2</button>
        <button class="pin-key" data-key="3">3</button>
        <button class="pin-key" data-key="4">4</button>
        <button class="pin-key" data-key="5">5</button>
        <button class="pin-key" data-key="6">6</button>
        <button class="pin-key" data-key="7">7</button>
        <button class="pin-key" data-key="8">8</button>
        <button class="pin-key" data-key="9">9</button>
        <button class="pin-key pin-action" data-key="clear">Clear</button>
        <button class="pin-key" data-key="0">0</button>
        <button class="pin-key pin-action" data-key="enter">Enter</button>
      </div>
    </div>
  </div>

  <!-- =========================================================
       SECURE PIN ENTRY OVERLAY
       ========================================================= -->
  <div id="secure-pin-overlay" class="overlay hidden">
    <div id="secure-pin-modal" class="modal">
      <button id="secure-pin-close" class="modal-close" aria-label="Close">
        <span class="material-icons">close</span>
      </button>

      <h2 id="secure-pin-title"><span class="material-icons" style="vertical-align:middle;font-size:22px;margin-right:4px;">lock</span> Secure PIN</h2>

      <div id="secure-pin-display">
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
        <span class="pin-dot"></span>
      </div>

      <div id="secure-pin-keypad" class="pin-keypad">
        <button class="pin-key" data-key="1">1</button>
        <button class="pin-key" data-key="2">2</button>
        <button class="pin-key" data-key="3">3</button>
        <button class="pin-key" data-key="4">4</button>
        <button class="pin-key" data-key="5">5</button>
        <button class="pin-key" data-key="6">6</button>
        <button class="pin-key" data-key="7">7</button>
        <button class="pin-key" data-key="8">8</button>
        <button class="pin-key" data-key="9">9</button>
        <button class="pin-key pin-action" data-key="clear">Clear</button>
        <button class="pin-key" data-key="0">0</button>
        <button class="pin-key pin-action" data-key="enter">Enter</button>
      </div>
    </div>
  </div>

  <!-- =========================================================
       BOTTOM NAVIGATION BAR
       ========================================================= -->
  <nav id="nav-bar">
    <button class="nav-item active" data-page="home">
      <span class="material-icons">home</span>
      <span class="nav-label">HOME</span>
    </button>

    <button class="nav-item" data-page="main">
      <span class="material-icons">account_balance</span>
      <span class="nav-label">MAIN</span>
    </button>

    <button class="nav-item" data-page="chapel">
      <span class="material-icons">temple_buddhist</span>
      <span class="nav-label">CHAPEL</span>
    </button>

    <button class="nav-item" data-page="social">
      <span class="material-icons">groups</span>
      <span class="nav-label">SOCIAL</span>
    </button>

    <button class="nav-item" data-page="gym">
      <span class="material-icons">fitness_center</span>
      <span class="nav-label">GYM</span>
    </button>

    <div id="nav-logo">
      <img src="assets/images/church-seal.png" alt="Church Seal" id="church-seal" onerror="this.style.display='none'">
    </div>

    <button class="nav-item" data-page="confroom">
      <span class="material-icons">meeting_room</span>
      <span class="nav-label">CONF. RM</span>
    </button>

    <button class="nav-item" data-page="stream">
      <span class="material-icons">cast</span>
      <span class="nav-label">STREAM</span>
    </button>

    <button class="nav-item" data-page="source">
      <span class="material-icons">settings_input_hdmi</span>
      <span class="nav-label">SOURCE</span>
    </button>

    <button class="nav-item" data-page="security">
      <span class="material-icons">security</span>
      <span class="nav-label">SECURITY</span>
    </button>

    <button class="nav-item" data-page="wattbox">
      <span class="material-icons">electrical_services</span>
      <span class="nav-label">POWER</span>
    </button>

    <button class="nav-item" data-page="settings">
      <span class="material-icons">settings</span>
      <span class="nav-label">SETTINGS</span>
    </button>
  </nav>

  <!-- =========================================================
       MOBILE NAV DRAWER (visible only on phones)
       ========================================================= -->
  <div id="mobile-nav-overlay" class="mobile-only"></div>
  <aside id="mobile-nav-drawer" class="mobile-only">
    <div class="drawer-header">
      <img src="assets/images/church-seal.png" alt="Church Seal" class="drawer-seal" onerror="this.style.display='none'">
      <span class="drawer-title">Navigation</span>
    </div>
    <button class="drawer-item" data-page="home">
      <span class="material-icons">home</span><span>Home</span>
    </button>
    <button class="drawer-item" data-page="main">
      <span class="material-icons">account_balance</span><span>Main Church</span>
    </button>
    <button class="drawer-item" data-page="chapel">
      <span class="material-icons">temple_buddhist</span><span>Chapel</span>
    </button>
    <button class="drawer-item" data-page="social">
      <span class="material-icons">groups</span><span>Social Hall</span>
    </button>
    <button class="drawer-item" data-page="gym">
      <span class="material-icons">fitness_center</span><span>Gym</span>
    </button>
    <button class="drawer-item" data-page="confroom">
      <span class="material-icons">meeting_room</span><span>Conference Room</span>
    </button>
    <div class="drawer-divider"></div>
    <button class="drawer-item" data-page="stream">
      <span class="material-icons">cast</span><span>Stream</span>
    </button>
    <button class="drawer-item" data-page="source">
      <span class="material-icons">settings_input_hdmi</span><span>Source</span>
    </button>
    <button class="drawer-item" data-page="security">
      <span class="material-icons">security</span><span>Security</span>
    </button>
    <div class="drawer-divider"></div>
    <button class="drawer-item" data-page="wattbox">
      <span class="material-icons">electrical_services</span><span>Power (WattBox)</span>
    </button>
    <button class="drawer-item" data-page="health">
      <span class="material-icons">monitor_heart</span><span>Health</span>
    </button>
    <button class="drawer-item" data-page="settings">
      <span class="material-icons">settings</span><span>Settings</span>
    </button>
  </aside>

  <!-- =========================================================
       JAVASCRIPT MODULES
       ========================================================= -->
  <!-- Socket.IO v4 client (must match Flask-SocketIO 5.x / python-socketio 5.x) -->
  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
  <script>
    // Fallback to server-served client if CDN unavailable
    if (typeof io === 'undefined') {
      document.write('<script src="/socket.io/socket.io.js"><\/script>');
    }
  </script>

  <!-- API layer -->
  <script src="js/api/obs.js?v=26089"></script>
  <script src="js/api/x32.js?v=26089"></script>
  <script src="js/api/moip.js?v=26089"></script>
  <script src="js/api/ptz.js?v=26089"></script>
  <script src="js/api/epson.js?v=26089"></script>
  <script src="js/api/health.js?v=26089"></script>
  <script src="js/api/notifications.js?v=26089"></script>
  <script src="js/api/macro.js?v=26089"></script>

  <!-- Core -->
  <script src="js/auth.js?v=26089"></script>
  <script src="js/router.js?v=26089"></script>

  <!-- Pages -->
  <script src="js/pages/home.js?v=26089"></script>
  <script src="js/pages/main.js?v=26089"></script>
  <script src="js/pages/chapel.js?v=26089"></script>
  <script src="js/pages/social.js?v=26089"></script>
  <script src="js/pages/gym.js?v=26089"></script>
  <script src="js/pages/confroom.js?v=26089"></script>
  <script src="js/pages/stream.js?v=26089"></script>
  <script src="js/pages/source.js?v=26089"></script>
  <script src="js/pages/security.js?v=26089"></script>
  <script src="js/pages/settings.js?v=26089"></script>
  <script src="js/pages/health.js?v=26089"></script>
  <script src="js/pages/occupancy.js?v=26089"></script>
  <script src="js/pages/wattbox.js?v=26089"></script>

  <!-- Chart.js (used by Occupancy dashboard) -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>

  <!-- HLS.js (used by MoIP preview for HLS stream playback on non-Safari browsers) -->
  <script src="https://cdn.jsdelivr.net/npm/hls.js@1"></script>

  <!-- App entry point -->
  <script src="js/app.js?v=26089"></script>

</body>
</html>
