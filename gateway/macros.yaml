      - type: moip_switch
        tx: 14
        rx: 19
      - type: moip_switch
        tx: 14
        rx: 32
      - type: ha_service
        domain: "switch"
        service: "turn_on"
        data: { entity_id: "switch.wb_005_chapel_ceilingrack_outlet_3" }      
        
  chapel_source_windows_display:
    label: "Social Windows Display"
    icon: "laptop"
    steps:
      - type: ha_service
        domain: "switch"
        service: "turn_on"
        data: { entity_id: "switch.sw_031_hall_windowsdisplayadapter" }
        on_fail: skip
        message: "Turning on Windows Display Adapter"
      - type: moip_switch
        tx: 15
        rx: 47
      - type: moip_switch
        tx: 15
        rx: 09
      - type: moip_switch
        tx: 15
