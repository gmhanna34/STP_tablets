# =============================================================================
# STP Macro & Button Configuration
# =============================================================================
# This file defines:
#   1. macros   — Named sequences of steps (the logic)
#   2. buttons  — Page-specific button layouts (the UI)
#
# STEP TYPES:
#   ha_check      Check a Home Assistant entity state
#   ha_service    Call a Home Assistant service
#   moip_switch   Switch a single video TX → RX
#   moip_ir       Send an IR code via MoIP receiver
#   moip_scene    Execute a pre-defined MoIP scene (DEPRECATED — use moip_switch)
#   epson_power   Control a single projector (on/off)
#   epson_all     Control all projectors (on/off)
#   x32_scene     Load an X32 mixer scene
#   x32_mute      Mute/unmute an X32 channel
#   obs_emit      Trigger an OBS action (StartStream, StopStream, etc.)
#   ptz_preset    Recall a PTZ camera preset
#   delay         Wait N seconds (with optional progress message)
#   macro         Call another macro (nesting, max depth 5)
#   parallel      Run sub-steps concurrently (all must succeed unless on_fail: skip)
#   condition     If/then/else branching based on a check
#   notify        Broadcast a message to all tablets
#
# ON_FAIL OPTIONS (per step):
#   abort         Stop the macro and report failure (default)
#   skip          Log a warning, continue to the next step
#   retry:N       Retry the step N times (1s between attempts)
# =============================================================================


macros:

  # ---------------------------------------------------------------------------
  # SHARED AUDIO — common startup steps used by all zone audio macros
  # ---------------------------------------------------------------------------

  shared_audio_on:
    label: "Shared Audio On"
    icon: "mic"
    description: "Turn on X32 mixer, shared amps, antennas, sub, and audio routing"
    steps:
      # If X32 mixer is off, load default scene after boot
      - type: condition
        if:
          type: ha_check
          entity: "switch.sw_019_2spare"
          expect: "off"
        then:
          - type: ha_service
            domain: "switch"
            service: "turn_on"
            data: { entity_id: "switch.sw_019_2spare" }
            on_fail: skip
            message: "Turning on X32 Mixer (was off)"
          - type: delay
            seconds: 40
            message: "Waiting for X32 mixer to boot up"
          - type: x32_scene
            scene: 0
            message: "Loading X32 default scene"
        else:
          - type: ha_service
            domain: "switch"
            service: "turn_on"
            data: { entity_id: "switch.sw_019_2spare" }
            on_fail: skip
            message: "Turning on X32 Mixer"
      - type: ha_service
        domain: "switch"
        service: "turn_on"
        data: { entity_id: "switch.sw_020_spare_plug1" }
        on_fail: skip
        message: "Turning on Antennas (W_020_AV_1Antennas)"
      - type: ha_service
        domain: "switch"
        service: "turn_on"
        data: { entity_id: "switch.sw_033_av_2socialhallandpaamp" }
        on_fail: skip
        message: "Turning on Social Hall & PA Amp (Kasa)"
      - type: ha_service
        domain: "switch"
        service: "turn_on"
        data: { entity_id: "switch.sw_020_spare_plug4" }
        on_fail: skip
        message: "Turning on PA Amp"
      - type: ha_service
        domain: "switch"
        service: "turn_on"
        data: { entity_id: "switch.sw_020_spare_plug5" }
        on_fail: skip
        message: "Turning on Main Audio Sub"
      - type: delay
        seconds: 5
        message: "Waiting for shared audio to initialize"
      # Audio routing
      - type: moip_switch
        tx: 13
        rx: 24
        message: "Setting audio routing (TX 13 → RX 24)"

  # ---------------------------------------------------------------------------
  # CHAPEL
  # ---------------------------------------------------------------------------

  chapel_tv_on:
    label: "Chapel TVs On"
    icon: "tv"
    description: "Send IR power-on immediately, then enable power supplies and repeat IR"
    steps:
      # Send IR power-on immediately (in case TVs already have power)
      - type: moip_ir
        receiver: 09
        code: "IRPowerOnVizio"
        message: "Quick power-on to Chapel Vizio TV"
      - type: moip_ir
        receiver: 09
        code: "IRPowerOnRCA"
        message: "Quick power-on to Chapel Floating TV"
      # Enable HDMI transmitter, IR, and battery power — all independent
      - type: parallel
        message: "Enabling Chapel HDMI, IR, and TV battery power"
        steps:
          - type: ha_service
            domain: "switch"
            service: "turn_on"
            data: { entity_id: "switch.wb_005_chapel_ceilingrack_outlet_1" }
            on_fail: skip
          - type: ha_service
            domain: "switch"
            service: "turn_on"
            data: { entity_id: "switch.wb_005_chapel_ceilingrack_outlet_2" }
            on_fail: skip
          - type: ha_service
            domain: "switch"
            service: "turn_on"
            data: { entity_id: "switch.bat_chapeltv_1_ac_enabled" }
            on_fail: skip
          - type: ha_service
            domain: "switch"
            service: "turn_on"
            data: { entity_id: "switch.bat_chapeltv_1_dc12v_enabled" }
            on_fail: skip
          - type: ha_service
            domain: "switch"
            service: "turn_on"
            data: { entity_id: "switch.bat_chapeltv_2_ac_enabled" }
            on_fail: skip
          - type: ha_service
            domain: "switch"
            service: "turn_on"
            data: { entity_id: "switch.bat_chapeltv_2_dc12v_enabled" }
            on_fail: skip
      # IR Power On - Round 1
      - type: moip_ir
        receiver: 09
        code: "IRPowerOnVizio"
        message: "Sending power-on to Chapel Vizio TV"
      - type: moip_ir
        receiver: 09
        code: "IRPowerOnRCA"
        message: "Sending power-on to Chapel Floating TV"
      - type: delay
        seconds: 3
        message: "Waiting for TVs to respond"
      # IR Power On - Round 2
      - type: moip_ir
        receiver: 09
        code: "IRPowerOnVizio"
        message: "Repeat power-on to Chapel Vizio TV"
      - type: moip_ir
        receiver: 09
        code: "IRPowerOnRCA"
        message: "Repeat power-on to Chapel Floating TV"
      - type: delay
        seconds: 5
        message: "Waiting for TVs to initialize"
      # Set HDMI input (Vizio only)
      - type: moip_ir
        receiver: 09
        code: "IRSourceHDMI1Vizio"
        message: "Setting Chapel Vizio TV to HDMI 1"
      - type: delay
        seconds: 3
      - type: moip_ir
        receiver: 09
        code: "IRSourceHDMI1Vizio"
        message: "Repeat HDMI 1 for Chapel Vizio TV"

  chapel_tv_off:
    label: "Chapel TVs Off"
    icon: "tv_off"
    confirm: "Turn off all Chapel TVs?"
    steps:
      - type: moip_ir
        receiver: 09
        code: "IRPowerOffVizio"
        message: "Powering off Chapel Vizio TV"
      - type: moip_ir
        receiver: 09
        code: "IRPowerOffRCA"
        message: "Powering off Chapel Floating TV"
      - type: delay
        seconds: 3
      - type: moip_ir
        receiver: 09
        code: "IRPowerOffVizio"
        message: "Repeat power-off Chapel Vizio TV"
      - type: moip_ir
        receiver: 09
        code: "IRPowerOffRCA"
        message: "Repeat power-off Chapel Floating TV"
      - type: delay
        seconds: 3
      # Third and fourth Vizio power-off to match THR reliability
      - type: moip_ir
        receiver: 09
        code: "IRPowerOffVizio"
        message: "Third power-off Chapel Vizio TV"
      - type: delay
        seconds: 3
      - type: moip_ir
        receiver: 09
        code: "IRPowerOffVizio"
        message: "Fourth power-off Chapel Vizio TV"
      - type: notify
        message: "Chapel TVs powered off"

  chapel_audio_on:
    label: "Chapel Audio On"
    icon: "mic"
    description: "Turn on shared audio components, chapel mics, amp, and routing"
    steps:
      - type: macro
        macro: "shared_audio_on"
        message: "Starting shared audio components"
      # Chapel microphones
      - type: ha_service
        domain: "switch"
        service: "turn_on"
        data: { entity_id: "switch.sw_024_spare" }
        on_fail: skip
        message: "Turning on Chapel microphones"
      # Chapel amplifier
      - type: ha_service
        domain: "switch"
        service: "turn_on"
        data: { entity_id: "switch.sw_020_spare_plug3" }
        on_fail: skip
        message: "Turning on Chapel Amplifier"
      # WattBox IR outlets
      - type: ha_service
        domain: "switch"
        service: "turn_on"
        data: { entity_id: "switch.wb_005_chapel_ceilingrack_outlet_2" }
        on_fail: skip
        message: "Turning on Chapel Screens IR"
      - type: ha_service
        domain: "switch"
        service: "turn_on"
        data: { entity_id: "switch.wb_005_chapel_ceilingrack_outlet_4" }
        on_fail: skip
        message: "Turning on Chapel IR Transmitter"

  chapel_audio_off:
    label: "Chapel Audio Off"
    icon: "mic_off"
    confirm: "Turn off Chapel audio?"
    steps:
      - type: ha_service
        domain: "switch"
        service: "turn_off"
        data: { entity_id: "switch.sw_020_spare_plug3" }
        on_fail: skip
        message: "Turning off Chapel Amplifier"
      - type: delay
        seconds: 5
      - type: ha_service
        domain: "switch"
        service: "turn_off"
        data: { entity_id: "switch.sw_024_spare" }
        on_fail: skip
        message: "Turning off Chapel microphones"

  chapel_ac_on:
    label: "Chapel A/C On"
    icon: "thermostat"
    steps:
      - type: ha_service
        domain: "climate"
        service: "turn_on"
        data: { entity_id: "climate.chapel_and_main_hallway" }

  chapel_ac_off:
    label: "Chapel A/C Off"
    icon: "thermostat"
    confirm: "Turn off Chapel A/C?"
    steps:
      - type: ha_service
        domain: "climate"
        service: "turn_off"
        data: { entity_id: "climate.chapel_and_main_hallway" }

  chapel_source_laptop:
    label: "Social Hall Laptop"
    icon: "laptop"
