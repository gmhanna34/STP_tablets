  chapel_source_announcements:
    label: "Chapel Announcements"
    icon: "announcement"
    steps:
      - type: moip_switch
        tx: 9
        rx: 47
      - type: moip_switch
        tx: 9
        rx: 9
      - type: moip_switch
        tx: 9
