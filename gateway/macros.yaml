        on_fail: skip
        message: "Samsung API power-on Left TV"
      - type: delay
        seconds: 4
        message: "Waiting for TV to initialize"
      - type: moip_ir
        receiver: 28
        code: "IRPowerOn"
        message: "Sending repeat power-on to Left TV"
      - type: moip_switch
        tx: 8
        rx: 28
        message: "Setting default source to Live Stream"
      - type: moip_ir
        receiver: 28
        code: "IRSourceHDMI1"
        message: "Setting Left TV to HDMI 1"
      - type: delay
        seconds: 4
      # Third IR power-on to match THR
      - type: moip_ir
        receiver: 28
        code: "IRPowerOn"
