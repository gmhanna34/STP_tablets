  # ---------------------------------------------------------------------------
  # SOCIAL HALL
  # ---------------------------------------------------------------------------

  social_video_on:
    label: "Social Hall Video On"
    icon: "tv"
    description: "Power on all 8 video wall panels via IR + Samsung API, set HDMI1, shared video"
    steps:
      # Round 1: IR PowerOn to all 8 panels
      - type: moip_ir
        receiver: 1
        code: "IRPowerOn"
      - type: moip_ir
        receiver: 2
        code: "IRPowerOn"
      - type: moip_ir
        receiver: 3
        code: "IRPowerOn"
      - type: moip_ir
        receiver: 4
        code: "IRPowerOn"
      - type: moip_ir
        receiver: 5
        code: "IRPowerOn"
      - type: moip_ir
        receiver: 6
        code: "IRPowerOn"
      - type: moip_ir
        receiver: 7
        code: "IRPowerOn"
      - type: moip_ir
        receiver: 8
        code: "IRPowerOn"
      # Round 1: Roku API PowerOn to all 8 TVs
      - type: ha_service
        domain: "media_player"
        service: "turn_on"
        data: { entity_id: "media_player.tv_099_hall_videowallp1" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_on"
        data: { entity_id: "media_player.tv_099_hall_videowallp2" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_on"
        data: { entity_id: "media_player.tv_099_hall_videowallp3" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_on"
        data: { entity_id: "media_player.tv_099_hall_videowallp4" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_on"
        data: { entity_id: "media_player.tv_099_hall_videowallp5" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_on"
        data: { entity_id: "media_player.tv_099_hall_videowallp6" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_on"
        data: { entity_id: "media_player.tv_099_hall_videowallp7" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_on"
        data: { entity_id: "media_player.tv_099_hall_videowallp8" }
        on_fail: skip
      - type: delay
        seconds: 1
        message: "Waiting for panels to respond"
      # Round 2: IR + Roku API PowerOn
      - type: moip_ir
        receiver: 1
        code: "IRPowerOn"
      - type: moip_ir
        receiver: 2
        code: "IRPowerOn"
      - type: moip_ir
        receiver: 3
        code: "IRPowerOn"
      - type: moip_ir
        receiver: 4
        code: "IRPowerOn"
      - type: moip_ir
        receiver: 5
        code: "IRPowerOn"
      - type: moip_ir
        receiver: 6
        code: "IRPowerOn"
      - type: moip_ir
        receiver: 7
        code: "IRPowerOn"
      - type: moip_ir
        receiver: 8
        code: "IRPowerOn"
      - type: ha_service
        domain: "media_player"
        service: "turn_on"
        data: { entity_id: "media_player.tv_099_hall_videowallp1" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_on"
        data: { entity_id: "media_player.tv_099_hall_videowallp2" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_on"
        data: { entity_id: "media_player.tv_099_hall_videowallp3" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_on"
        data: { entity_id: "media_player.tv_099_hall_videowallp4" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_on"
        data: { entity_id: "media_player.tv_099_hall_videowallp5" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_on"
        data: { entity_id: "media_player.tv_099_hall_videowallp6" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_on"
        data: { entity_id: "media_player.tv_099_hall_videowallp7" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_on"
        data: { entity_id: "media_player.tv_099_hall_videowallp8" }
        on_fail: skip
      - type: delay
        seconds: 2
      # Round 3: IR PowerOn (third round to match THR)
      - type: moip_ir
        receiver: 1
        code: "IRPowerOn"
      - type: moip_ir
        receiver: 2
        code: "IRPowerOn"
      - type: moip_ir
        receiver: 3
        code: "IRPowerOn"
      - type: moip_ir
        receiver: 4
        code: "IRPowerOn"
      - type: moip_ir
        receiver: 5
        code: "IRPowerOn"
      - type: moip_ir
        receiver: 6
        code: "IRPowerOn"
      - type: moip_ir
        receiver: 7
        code: "IRPowerOn"
      - type: moip_ir
        receiver: 8
        code: "IRPowerOn"
      # Set all panels to HDMI1 - Round 1
      - type: moip_ir
        receiver: 1
        code: "IRSourceHDMI1"
      - type: moip_ir
        receiver: 2
        code: "IRSourceHDMI1"
      - type: moip_ir
        receiver: 3
        code: "IRSourceHDMI1"
      - type: moip_ir
        receiver: 4
        code: "IRSourceHDMI1"
      - type: moip_ir
        receiver: 5
        code: "IRSourceHDMI1"
      - type: moip_ir
        receiver: 6
        code: "IRSourceHDMI1"
      - type: moip_ir
        receiver: 7
        code: "IRSourceHDMI1"
      - type: moip_ir
        receiver: 8
        code: "IRSourceHDMI1"
      - type: delay
        seconds: 4
      # Extra attention for panel 4 (known problematic in THR)
      - type: moip_ir
        receiver: 4
        code: "IRPowerOn"
        message: "Extra power-on for panel 4"
      - type: delay
        seconds: 1
      - type: moip_ir
        receiver: 4
        code: "IRSourceHDMI1"
        message: "Extra HDMI1 for panel 4"
      - type: delay
        seconds: 5
      # Set all panels to HDMI1 - Round 2
      - type: moip_ir
        receiver: 1
        code: "IRSourceHDMI1"
      - type: moip_ir
        receiver: 2
        code: "IRSourceHDMI1"
      - type: moip_ir
        receiver: 3
        code: "IRSourceHDMI1"
      - type: moip_ir
        receiver: 4
        code: "IRSourceHDMI1"
      - type: moip_ir
        receiver: 5
        code: "IRSourceHDMI1"
      - type: moip_ir
        receiver: 6
        code: "IRSourceHDMI1"
      - type: moip_ir
        receiver: 7
        code: "IRSourceHDMI1"
      - type: moip_ir
        receiver: 8
        code: "IRSourceHDMI1"
      # Extra IR PowerOn to RX 8 (THR includes after 10s delay)
      - type: moip_ir
        receiver: 8
        code: "IRPowerOn"
        message: "Extra power-on for panel 8"
      # Social Hall AppleTV Home
      - type: moip_ir
        receiver: 06
        code: "AppleTVHome"
        on_fail: skip
        message: "Sending AppleTV Home to Social Hall"
      # Turn on shared video infrastructure
      - type: ha_service
        domain: "switch"
        service: "turn_on"
        data: { entity_id: "switch.sw_019_av_1moipcontroller" }
        on_fail: skip
        message: "Turning on MoIP controller"
      - type: ha_service
        domain: "switch"
        service: "turn_on"
        data: { entity_id: "switch.sw_003_hall_leftspeaker2" }
        on_fail: skip
        message: "Turning on Blackmagic ATEM"
      - type: delay
        seconds: 5
        message: "Waiting for ATEM to initialize"
      - type: obs_emit
        action: "CallVendorRequest"
        data:
          vendorName: "AdvancedSceneSwitcher"
          requestType: "AdvancedSceneSwitcherMessage"
          requestData:
            message: "reEnableBMATEMWebcam"
        on_fail: skip
        message: "Re-enabling BMATEM webcam in OBS"
      - type: notify
        message: "Social Hall video wall powering on"

  social_video_off:
    label: "Social Hall Video Off"
    icon: "tv_off"
    confirm: "Turn off Social Hall video wall?"
    steps:
      # STRATEGY: Roku API calls go FIRST (reliable, network-based, idempotent).
      # IR codes are power TOGGLES (not discrete off), so they must only be sent
      # ONCE after the API has had time to turn TVs off — otherwise a toggle
      # sent to an already-off TV turns it back on.

      # Round 1: Roku API turn_off to all 8 TVs (idempotent — safe to call on already-off TVs)
      - type: ha_service
        domain: "media_player"
        service: "turn_off"
        data: { entity_id: "media_player.tv_099_hall_videowallp1" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_off"
        data: { entity_id: "media_player.tv_099_hall_videowallp2" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_off"
        data: { entity_id: "media_player.tv_099_hall_videowallp3" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_off"
        data: { entity_id: "media_player.tv_099_hall_videowallp4" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_off"
        data: { entity_id: "media_player.tv_099_hall_videowallp5" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_off"
        data: { entity_id: "media_player.tv_099_hall_videowallp6" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_off"
        data: { entity_id: "media_player.tv_099_hall_videowallp7" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_off"
        data: { entity_id: "media_player.tv_099_hall_videowallp8" }
        on_fail: skip
      - type: delay
        seconds: 3
        message: "Waiting for Roku API to turn off TVs"
      # Round 2: Roku API again (for any that were slow to respond)
      - type: ha_service
        domain: "media_player"
        service: "turn_off"
        data: { entity_id: "media_player.tv_099_hall_videowallp1" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_off"
        data: { entity_id: "media_player.tv_099_hall_videowallp2" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_off"
        data: { entity_id: "media_player.tv_099_hall_videowallp3" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_off"
        data: { entity_id: "media_player.tv_099_hall_videowallp4" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_off"
        data: { entity_id: "media_player.tv_099_hall_videowallp5" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_off"
        data: { entity_id: "media_player.tv_099_hall_videowallp6" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_off"
        data: { entity_id: "media_player.tv_099_hall_videowallp7" }
        on_fail: skip
      - type: ha_service
        domain: "media_player"
        service: "turn_off"
        data: { entity_id: "media_player.tv_099_hall_videowallp8" }
        on_fail: skip
      - type: delay
        seconds: 5
        message: "Waiting for all TVs to power down"
      # Round 3: Single IR pass as a last-resort backup for TVs unreachable via API.
      # Only one round — these are toggle codes, so a second pass would turn them on.
      - type: moip_ir
        receiver: 8
        code: "IRPowerOff"
      - type: moip_ir
        receiver: 1
        code: "IRPowerOff"
      - type: moip_ir
        receiver: 2
        code: "IRPowerOff"
      - type: moip_ir
        receiver: 3
        code: "IRPowerOff"
      - type: moip_ir
        receiver: 4
        code: "IRPowerOff"
      - type: moip_ir
        receiver: 5
        code: "IRPowerOff"
      - type: moip_ir
        receiver: 6
        code: "IRPowerOff"
      - type: moip_ir
        receiver: 7
        code: "IRPowerOff"
      - type: notify
        message: "Social Hall video wall powered off"

