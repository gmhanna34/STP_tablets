  chapel_source_appletv:
    label: "Chapel Apple TV"
    icon: "cast"
    steps:
      - type: ha_service
        domain: "switch"
        service: "turn_on"
        data: { entity_id: "switch.wb_005_chapel_ceilingrack_outlet_3" }
        on_fail: skip
        message: "Turning on Chapel Apple TV power"
      - type: moip_switch
        tx: 14
