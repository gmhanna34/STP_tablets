  # --- Left TV (RX 28 = ConfRoom_Left) ---

  confroom_left_tv_on:
    label: "Left TV On"
    icon: "tv"
    steps:
      - type: moip_ir
        receiver: 28
        code: "IRPowerOn"
        message: "Sending power-on to Conference Room Left TV"
      # Samsung API power-on
      - type: ha_service
        domain: "media_player"
