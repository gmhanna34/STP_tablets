  chapel_source_livestream:
    label: "Chapel Live Stream"
    icon: "live_tv"
    steps:
      - type: moip_switch
        tx: 8
        rx: 47
      - type: moip_switch
        tx: 8
        rx: 09
      - type: moip_switch
        tx: 8
        rx: 19

  # --- Nested macro: full chapel setup ---
  chapel_full_setup:
    label: "Chapel Full Setup"
    icon: "play_circle"
    description: "Full AV startup: TVs, audio, Apple TV source, live stream scene, camera preset, and unlock exterior doors for 3 hours"
    steps:
      # TVs and audio are independent — run simultaneously
      - type: parallel
        message: "Starting TVs and audio simultaneously"
        steps:
          - type: macro
            macro: "chapel_tv_on"
          - type: macro
            macro: "chapel_audio_on"
      - type: macro
        macro: "chapel_source_appletv"
        message: "Setting Chapel source to Apple TV"
      # OBS scene, camera preset, and door unlocks are all independent
      - type: parallel
        message: "Setting stream scene, camera, and unlocking doors"
        steps:
          - type: obs_emit
            action: "SetCurrentProgramScene"
            data:
              sceneName: "Chapel_Rear"
            on_fail: skip
          - type: ptz_preset
            camera: "Chapel_Rear"
            preset: 1
            on_fail: skip
          - type: door_timed_unlock
            entity: "lock.main_church_door"
            minutes: 180
            on_fail: skip
          - type: door_timed_unlock
            entity: "lock.main_lobby"
            minutes: 180
            on_fail: skip
          - type: macro
            macro: "stream_scene_chapel"
            on_fail: skip
            message: "Setting audio routing and X32 scene for Chapel"
      # --- Unlock exterior doors for 3 hours ---
      - type: door_timed_unlock
        entity: "lock.main_church_door"
        minutes: 180
        on_fail: skip
        message: "Unlocking main church door for 3 hours"
      - type: door_timed_unlock
        entity: "lock.main_lobby"
        minutes: 180
        on_fail: skip
        message: "Unlocking lobby door for 3 hours"

  chapel_full_teardown:
    label: "Chapel Teardown"
    icon: "power_settings_new"
    description: "Full AV shutdown: TVs off, audio off, A/C off"
    steps:
      - type: parallel
        message: "Shutting down TVs, audio, and A/C simultaneously"
        steps:
          - type: macro
            macro: "chapel_tv_off"
          - type: macro
            macro: "chapel_audio_off"
          - type: macro
            macro: "chapel_ac_off"

  # ---------------------------------------------------------------------------
  # MAIN CHURCH (examples — expand as needed)
  # ---------------------------------------------------------------------------

  # --- Child: Shared video components (reusable by Main Church & other rooms) ---
  shared_video_on:
    label: "Shared Video Components On"
    icon: "settings_input_hdmi"
    description: "MoIP controller, Blackmagic ATEM, OBS BMATEM webcam re-enable"
    steps:
      - type: ha_service
        domain: "switch"
        service: "turn_on"
        data: { entity_id: "switch.sw_019_av_1moipcontroller" }
        on_fail: skip
        message: "Turning on MoIP controller"
      - type: ha_service
        domain: "switch"
        service: "turn_on"
        data: { entity_id: "switch.sw_003_hall_leftspeaker2" }
        on_fail: skip
        message: "Turning on Blackmagic ATEM"
      - type: delay
        seconds: 5
        message: "Waiting for ATEM to initialize"
      - type: obs_emit
        action: "CallVendorRequest"
        data:
          vendorName: "AdvancedSceneSwitcher"
          requestType: "AdvancedSceneSwitcherMessage"
          requestData:
            message: "reEnableBMATEMWebcam"
        on_fail: skip
        message: "Re-enabling BMATEM webcam in OBS"

  # --- Child: Turn on projectors (power outlets → staggered Epson) ---
  main_projectors_on:
    label: "Projectors On"
    icon: "tv"
    description: "Power outlets on, then each projector with stagger delays"
    steps:
      # Projector power switches (Kasa plugs) — all independent
      - type: parallel
        message: "Powering on all projector outlets"
        steps:
          - type: ha_service
            domain: "switch"
            service: "turn_on"
            data: { entity_id: "switch.sw_034_mc_frontleft_new" }
            on_fail: skip
          - type: ha_service
            domain: "switch"
            service: "turn_on"
            data: { entity_id: "switch.sw_035_mc_frontright" }
            on_fail: skip
          - type: ha_service
            domain: "switch"
            service: "turn_on"
            data: { entity_id: "switch.sw_036_mc_rearright" }
            on_fail: skip
          - type: ha_service
            domain: "switch"
            service: "turn_on"
            data: { entity_id: "switch.sw_037_mc_rearleft" }
            on_fail: skip
      # Individual Epson projectors with 1s stagger delays
      - type: epson_power
        projector: "epson1"
        state: "on"
        on_fail: skip
        message: "Powering on Projector 1 (Front Left)"
      - type: ha_service
        domain: "switch"
        service: "turn_on"
        data: { entity_id: "switch.vs_epsonprojector1" }
        on_fail: skip
      - type: delay
        seconds: 0.5
      - type: epson_power
        projector: "epson2"
        state: "on"
        on_fail: skip
        message: "Powering on Projector 2 (Front Right)"
      - type: ha_service
        domain: "switch"
        service: "turn_on"
        data: { entity_id: "switch.vs_epsonprojector2" }
        on_fail: skip
      - type: delay
        seconds: 0.5
      - type: epson_power
        projector: "epson3"
        state: "on"
        on_fail: skip
        message: "Powering on Projector 3 (Rear Left)"
      - type: ha_service
        domain: "switch"
        service: "turn_on"
        data: { entity_id: "switch.vs_epsonprojector3" }
        on_fail: skip
      - type: delay
        seconds: 0.5
      - type: epson_power
        projector: "epson4"
        state: "on"
        on_fail: skip
        message: "Powering on Projector 4 (Rear Right)"
      - type: ha_service
        domain: "switch"
        service: "turn_on"
        data: { entity_id: "switch.vs_epsonprojector4" }
        on_fail: skip
      # Retry Projector 3 (known flaky per THR)
      - type: delay
        seconds: 1
        message: "Waiting before Projector 3 retry"
      - type: epson_power
        projector: "epson3"
        state: "on"
        on_fail: skip
        message: "Retrying Projector 3 (Rear Left)"

  # --- Child: Lower screens and projector shelves (Insteon relay) ---
  main_screens_shelf_down:
    label: "Screens & Shelf Down"
    icon: "expand_more"
    description: "Lower projection screens and shelves via Insteon I/O Linc relay"
    steps:
      - type: ha_service
        domain: "switch"
        service: "turn_on"
        data: { entity_id: "switch.i_o_linc_70_7e_96_relay" }
        on_fail: skip
        message: "Lowering screens and projector shelves"

  # --- Child: Raise screens and projector shelves (Insteon relay) ---
  main_screens_shelf_up:
    label: "Screens & Shelf Up"
    icon: "expand_less"
    description: "Raise projection screens and shelves via Insteon I/O Linc relay"
    steps:
      - type: ha_service
        domain: "switch"
        service: "turn_off"
        data: { entity_id: "switch.i_o_linc_70_7e_96_relay" }
        on_fail: skip
        message: "Raising screens and projector shelves"

  # --- Child: Cry room TV on ---
  main_cryroom_on:
    label: "Cry Room TV On"
    icon: "tv"
    description: "Power on cry room TV and set to HDMI 1"
    steps:
      - type: moip_ir
        receiver: 35
        code: "IRPowerOn"
        message: "Turning on cry room TV"
      - type: delay
        seconds: 20
        message: "Waiting for cry room TV to boot"
      - type: moip_ir
        receiver: 35
        code: "IRSourceHDMI1"
        message: "Setting cry room TV to HDMI 1"

  # --- Child: Cry room TV off ---
  main_cryroom_off:
    label: "Cry Room TV Off"
    icon: "tv_off"
    description: "Power off cry room TV"
    steps:
      - type: moip_ir
        receiver: 35
        code: "IRPowerOff"
        message: "Turning off cry room TV"

  # --- Child: Portables off ---
  main_portables_off:
    label: "Portables Off"
    icon: "tv_off"
    description: "Power off portable displays (IR sent twice for reliability)"
    steps:
      - type: moip_ir
        receiver: 34
        code: "IRPowerOff"
        message: "Turning off portables"
      - type: delay
        seconds: 2
      - type: moip_ir
        receiver: 34
        code: "IRPowerOff"
        message: "Repeat power-off for portables"

  # --- Parent: Main Church Video On ---
  # Order: screens first (instant, independent), projectors, cry room, shared video last
  main_video_on:
    label: "Video System On"
    icon: "tv"
    description: "Lower screens, power on projectors, cry room, shared video"
    steps:
      # All four sub-systems are independent — run simultaneously
      - type: parallel
        message: "Starting all video sub-systems simultaneously"
        steps:
          - type: macro
            macro: "main_screens_shelf_down"
          - type: macro
            macro: "main_projectors_on"
          - type: macro
            macro: "main_cryroom_on"
          - type: macro
            macro: "shared_video_on"
      - type: macro
        macro: "main_source_appletv_no_pages"
        message: "Setting video source to Apple TV (No Page #s)"
        conditional: "Set video source to AppleTV (no pages)?"
      - type: notify
        message: "Main church video system turning on"

  # --- Parent: Main Church Video Off ---
  main_video_off:
    label: "Video System Off"
    icon: "tv_off"
    confirm: "Turn OFF the entire video system (all projectors + screens)?"
    steps:
      # Everything is independent — screens, projectors, virtual switches, cry room, portables
      - type: parallel
        message: "Shutting down all video sub-systems simultaneously"
        steps:
          - type: macro
            macro: "main_screens_shelf_up"
          - type: epson_all
            state: "off"
            on_fail: skip
          - type: ha_service
            domain: "switch"
            service: "turn_off"
            data: { entity_id: "switch.vs_epsonprojector1" }
            on_fail: skip
          - type: ha_service
            domain: "switch"
            service: "turn_off"
            data: { entity_id: "switch.vs_epsonprojector2" }
            on_fail: skip
          - type: ha_service
            domain: "switch"
            service: "turn_off"
            data: { entity_id: "switch.vs_epsonprojector3" }
            on_fail: skip
          - type: ha_service
            domain: "switch"
            service: "turn_off"
            data: { entity_id: "switch.vs_epsonprojector4" }
            on_fail: skip
          - type: macro
            macro: "main_cryroom_off"
          - type: macro
            macro: "main_portables_off"
      - type: notify
        message: "Main church video system powered off"

