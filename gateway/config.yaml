gateway:
  host: 0.0.0.0
  port: 20858
  debug: false
  static_dir: ../frontend
middleware: null
obs:
  ws_url_local: ws://127.0.0.1:4455       # Tried first (OBS on same machine)
  ws_url_remote: ws://10.100.60.185:4455   # Fallback (OBS on Windows PC)
  ws_password: ''                          # Set OBS_WS_PASSWORD in .env
  ping_seconds: 3.0
  snapshot_seconds: 6.0
  offline_after_seconds: 10.0
  ping_fails_to_offline: 3
  max_scenes: 10
moip:
  host_internal: 10.100.20.11
  port_internal: 23
  host_external: external.stpauloc.org
  port_external: 2323
  username: ''                       # Set MOIP_USERNAME in .env
  password: ''                       # Set MOIP_PASSWORD in .env
  telnet_read_timeout: 5
  failure_threshold: 5
  reboot_cooldown_minutes: 15
  keepalive_interval_normal: 30
  keepalive_interval_max: 300
  # HA webhook for watchdog-triggered restarts (from old moip-flask.py)
  ha_webhook_id: ""              # Set MOIP_HA_WEBHOOK_ID in .env
  # Preview: dedicated receiver + HDMI encoder for on-demand transmitter preview
  preview:
    enabled: true                      # Encoder hardware installed (ORIVISION HLS encoder)
    encoder_ip: "10.100.60.181"        # Static IP of HDMI-to-IP encoder
    stream_url: "http://10.100.60.181:8100/chn2.m3u8"  # Encoder's HLS stream URL
    stream_type: "hls"                 # Stream type: "hls" (requires HLS.js) or "mjpeg" (legacy <img>)
    preview_receiver: 41               # MoIP receiver index dedicated to preview (RX 41 = Spare)
    switch_delay_ms: 3500              # Delay after switch before loading stream (signal lock + HLS segment flush)

# --- X32 mixer (direct OSC/UDP, Phase 1 consolidation) -----------------------
x32:
  mixer_ip: 10.100.60.231
  mixer_type: X32
  ping_seconds: 2.0
  snapshot_seconds: 6.0
  offline_after_seconds: 8.0
  ping_fails_to_offline: 3
  routing:
    send_level: 0.75
    source_groups:
      # Ch 1-4: ALTAR PRIEST, ALTAR ORANGE, ALTAR BLUE, ICONASIS
      # Ch 6: PODIUM
      # Ch 7-10: CHANT BLACK, CHANT GREY, CHANT ORANGE, CHANT BLUE
      - name: "Church Mics"
        icon: "mic"
        patterns: ["altar", "iconasis", "podium", "chant"]
      # Ch 11-14: CHAPEL ALTAR, CHAPEL BLACK, CHAPEL GRAY, CHAPEL BLUE
      - name: "Chapel Mics"
        icon: "mic_external_on"
        patterns: ["chapel"]
      # Ch 17-19: SOCIAL BLACK, SOCIAL BLUE, SOCIAL GRAY
      - name: "Social Hall Mics"
        icon: "mic_external_on"
        patterns: ["social"]
      # Ch 21-22: GAME ROOM1, GAME ROOM2
      - name: "Gym Mics"
        icon: "mic"
        patterns: ["game room"]
      # Ch 23: LAPEL MIC
      - name: "Lapel Mic"
        icon: "settings_voice"
        patterns: ["lapel"]
      # Ch 27-28: PC L, PC R
      - name: "PC Audio"
        icon: "computer"
        patterns: ["^pc"]
      # Aux 1-2: AIRPLAY L, AIRPLAY R
      - name: "AirPlay"
        icon: "airplay"
        patterns: ["airplay"]
        type: "aux"
      # Aux 3-4: ALEXA L, ALEXA R
      - name: "Alexa"
        icon: "smart_display"
        patterns: ["alexa"]
        type: "aux"
      # Aux 5-6: MOIP IN L, MOIP IN R
      - name: "MoIP Audio"
        icon: "settings_input_hdmi"
        patterns: ["moip"]
        type: "aux"
    destinations:
      # Bus 1+2: CHRCH CL'G L/R (linked)
      - name: "Main Church"
        icon: "church"
        buses: [1, 2]
        description: "Church Ceiling L/R speakers"
      # Bus 3: MAINCEILINGR (solo — not linked with bus 4)
      - name: "Main Ceiling"
        icon: "speaker"
        buses: [3]
        description: "Main ceiling rear speakers"
      # Bus 4: MOIP OUT (solo — feeds MoIP video distribution audio)
      - name: "MoIP Out"
        icon: "settings_input_hdmi"
        buses: [4]
        description: "Audio feed to MoIP video distribution"
      # Bus 5+6: CHAPEL LEFT/RIGHT (linked)
      - name: "Chapel"
        icon: "meeting_room"
        buses: [5, 6]
      # Bus 7+8: SOCIAL LEFT/RIGHT (linked)
      - name: "Social Hall"
        icon: "groups"
        buses: [7, 8]
      # Bus 9+10: GAME LEFT/RIGHT (linked)
      - name: "Gym"
        icon: "fitness_center"
        buses: [9, 10]
      # Bus 11+12: PA L7,8,9 / PA L10 (not linked — separate PA zones)
      - name: "PA System"
        icon: "campaign"
        buses: [11, 12]
        description: "Sunday School Rooms + Hallways"
    presets:
      normal_sunday:
        name: "Normal Sunday"
        icon: "church"
        description: "Standard Sunday service — Church Mics to Main + MoIP + Social + PA"
        routes:
          "Church Mics": ["Main Church", "Main Ceiling", "MoIP Out", "Social Hall", "PA System"]
          "Chapel Mics": ["Chapel"]
          "AirPlay": ["Main Church", "Main Ceiling", "Chapel"]
          "MoIP Audio": ["Main Church", "Main Ceiling", "Chapel"]
          "Alexa": ["Main Church", "Main Ceiling", "PA System"]
          "PC Audio": ["Main Church", "Main Ceiling", "Chapel", "Social Hall", "Gym", "PA System"]
      overflow:
        name: "Overflow to All"
        icon: "groups"
        description: "Church audio to every room for large events"
        routes:
          "Church Mics": ["Main Church", "Main Ceiling", "MoIP Out", "Chapel", "Social Hall", "Gym", "PA System"]
          "Chapel Mics": ["Chapel"]
          "AirPlay": ["Main Church", "Main Ceiling", "Chapel", "Social Hall"]
          "MoIP Audio": ["Main Church", "Main Ceiling", "Chapel", "Social Hall"]
          "Alexa": ["Main Church", "Main Ceiling", "PA System"]
          "PC Audio": ["Main Church", "Main Ceiling", "Chapel", "Social Hall", "Gym", "PA System"]
      social_event:
        name: "Social Hall Event"
        icon: "celebration"
        description: "Social Hall Mics to Social, Church Mics off in Social"
        routes:
          "Social Hall Mics": ["Social Hall"]
          "Chapel Mics": ["Chapel"]
          "AirPlay": ["Social Hall"]
      chapel_only:
        name: "Chapel Service"
        icon: "meeting_room"
        description: "Chapel Mics to Chapel speakers only"
        routes:
          "Chapel Mics": ["Chapel"]
      broadcast_all:
        name: "Broadcast All"
        icon: "spatial_audio"
        description: "All mic groups to all rooms"
        routes:
          "Church Mics": ["Main Church", "Main Ceiling", "MoIP Out", "Chapel", "Social Hall", "Gym", "PA System"]
          "Chapel Mics": ["Main Church", "Main Ceiling", "Chapel", "Social Hall", "Gym", "PA System"]
          "Social Hall Mics": ["Main Church", "Main Ceiling", "Social Hall", "Gym", "PA System"]
          "Gym Mics": ["Main Church", "Gym", "PA System"]
          "AirPlay": ["Main Church", "Main Ceiling", "Chapel", "Social Hall", "Gym"]
          "MoIP Audio": ["Main Church", "Main Ceiling", "Chapel", "Social Hall"]
          "Alexa": ["Main Church", "Main Ceiling", "Chapel", "Social Hall", "Gym", "PA System"]
          "PC Audio": ["Main Church", "Main Ceiling", "Chapel", "Social Hall", "Gym", "PA System"]
