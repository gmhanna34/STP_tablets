# =============================================================================
# STP Gateway Configuration
# =============================================================================
# All secrets and device IPs in one place. The gateway reads this at startup.
# On the church server, edit the values below to match your network.
# =============================================================================

gateway:
  host: "0.0.0.0"
  port: 20858
  debug: false
  # Path to the frontend directory (served as static files)
  # Adjust this path based on your server's directory layout
  static_dir: "../frontend"

# --- Middleware services (running alongside) ----------------------------------
middleware:
  # moip: DEPRECATED — now handled directly by MoIPModule (Phase 2 consolidation)
  # Uncomment below to revert to standalone moip-flask.py proxy if needed:
  #moip:
  #  url: "http://127.0.0.1:5002"
  #  api_key: ""
  #  timeout: 5
  # x32: DEPRECATED — now handled directly by X32Module (Phase 1 consolidation)
  # Uncomment below to revert to standalone x32-flask.py proxy if needed:
  #x32:
  #  url: "http://127.0.0.1:3400"
  #  api_key: ""
  #  timeout: 5
  # obs: DEPRECATED — now handled directly by OBSModule (Phase 3 consolidation)
  # Uncomment below to revert to standalone obs-flask.py proxy if needed:
  #obs:
  #  url: "http://127.0.0.1:4456"
  #  api_key: ""
  #  timeout: 10

# --- OBS Studio (direct WebSocket, Phase 3 consolidation) --------------------
obs:
  ws_url: "ws://127.0.0.1:4455"
  ws_password: ""                  # Set OBS_WS_PASSWORD in .env
  ping_seconds: 3.0
  snapshot_seconds: 6.0
  offline_after_seconds: 10.0
  ping_fails_to_offline: 3

# --- MoIP controller (direct Telnet, Phase 2 consolidation) ------------------
moip:
  host_internal: "10.100.20.11"
  port_internal: 23
  host_external: "external.stpauloc.org"
  port_external: 2323
  username: ""                   # Set MOIP_USERNAME in .env
  password: ""                   # Set MOIP_PASSWORD in .env
  telnet_read_timeout: 5
  failure_threshold: 5
  reboot_cooldown_minutes: 15
  keepalive_interval_normal: 30
  keepalive_interval_max: 300
  # HA webhook for watchdog-triggered restarts (from old moip-flask.py)
  ha_webhook_id: ""              # Set MOIP_HA_WEBHOOK_ID in .env

# --- X32 mixer (direct OSC/UDP, Phase 1 consolidation) -----------------------
x32:
  mixer_ip: "192.168.1.231"
  mixer_type: "X32"
  ping_seconds: 2.0
  snapshot_seconds: 6.0
  offline_after_seconds: 8.0
  ping_fails_to_offline: 3

# --- PTZ cameras (server-side control, replaces browser-direct no-cors) ------
ptz_cameras:
  MainChurch_Rear:    { ip: "192.168.1.201", name: "Cam1921681201" }
  MainChurch_Altar:   { ip: "192.168.1.202", name: "Cam1921681202" }
  MainChurch_Right:      { ip: "192.168.1.203", name: "Cam1921681203" }
  MainChurch_Side_Right: { ip: "192.168.1.203", name: "Cam1921681203" }
  MainChurch_Left:       { ip: "192.168.1.204", name: "Cam1921681204" }
  MainChurch_Side_Left:  { ip: "192.168.1.204", name: "Cam1921681204" }
  Chapel_Rear:        { ip: "192.168.1.205", name: "Cam1921681205" }
  Chapel_Side:        { ip: "192.168.1.206", name: "Cam1921681206" }
  BaptismRoom:        { ip: "192.168.1.207", name: "Cam1921681207" }
  SocialHall_Rear:    { ip: "192.168.1.208", name: "Cam1921681208" }
  SocialHall_Side:    { ip: "192.168.1.209", name: "Cam1921681209" }
  Gym:                { ip: "192.168.1.210", name: "Cam1921681210" }

# --- Epson projectors (server-side control) -----------------------------------
projectors:
  epson1: { ip: "192.168.1.233", name: "PRJ_FrontLeft" }
  epson2: { ip: "192.168.1.234", name: "PRJ_FrontRight" }
  epson3: { ip: "192.168.1.236", name: "PRJ_RearLeft" }
  epson4: { ip: "192.168.1.235", name: "PRJ_RearRight" }

# --- Fully Kiosk Browser (screensaver control) -------------------------------
fully_kiosk:
  port: 2323
  password: ""                     # Set FULLY_KIOSK_PASSWORD in .env
  screensaver_default: 20         # Normal screensaver timeout (seconds)
  screensaver_extended: 10800     # Extended timeout when panel is open (seconds)

# --- Home Assistant proxy -----------------------------------------------------
home_assistant:
  url: ""                          # Set HA_URL in .env
  token: ""                        # Set HA_TOKEN in .env
  timeout: 10

# --- WattBox direct control (break-glass fallback, bypasses Home Assistant) ---
wattbox:
  username: "admin"
  password: ""                     # Set WATTBOX_PASSWORD in .env
  timeout: 5
  # Map friendly device names → WattBox PDU IP + outlet number
  # These are placeholders — update with actual outlet assignments
  devices:
    ha_server:
      label: "Home Assistant Server"
      ip: "192.168.1.61"
      outlet: 1
    livestream_pc:
      label: "Live Stream PC"
      ip: "192.168.1.61"
      outlet: 2
    moip_controller:
      label: "MoIP Controller"
      ip: "192.168.1.62"
      outlet: 1
    x32_mixer:
      label: "X32 Mixer"
      ip: "192.168.1.62"
      outlet: 2

# --- Security -----------------------------------------------------------------
security:
  # IP prefix allowlist (same as existing middleware)
  allowed_ips:
    - "192.168.1."
    - "10.100."
    - "10.10."
    - "172.16."
    - "127.0.0.1"
    - "47.150."
  settings_pin: ""                 # Set SETTINGS_PIN in .env
  secret_key: ""                   # Set FLASK_SECRET_KEY in .env
  session_timeout_minutes: 480
  # Login credentials for access from outside the allowed IP ranges
  remote_auth:
    username: ""                   # Set REMOTE_AUTH_USER in .env
    password: ""                   # Set REMOTE_AUTH_PASS in .env

# --- Camlytics people counting ------------------------------------------------
camlytics:
  communion_url: "https://cloud.camlytics.com/feed/report/814c480b4a6d221401093b5bb77aff30"
  communion_buffer_default: 5        # Percentage buffer (e.g. -5 means subtract 5%)
  occupancy_url_peak: "https://cloud.camlytics.com/feed/report/4f82c3553002b39064ef61fc87cb8621"
  occupancy_url_live: "https://cloud.camlytics.com/feed/report/1acd7636230cc6af595f30ecef335519"
  occupancy_buffer_default: 12.5        # Percentage buffer (e.g. 20 means add 20%)
  enter_url: "https://cloud.camlytics.com/feed/report/521d0d268ead8cfeef6950a8676c8976" 
  enter_buffer_default: 0
  peak_window_hours: 2                # Look-back window for peak detection in chart data
  poll_interval: 5                    # Seconds between Camlytics API polls

# --- OBS settings -------------------------------------------------------------
obs:
  max_scenes: 10    # Only show the first N scenes from OBS

# --- State polling intervals (seconds) ----------------------------------------
polling:
  moip: 10
  x32: 5
  obs: 3
  projectors: 30

# --- Health Dashboard (Phase 4 consolidation — absorbed from STP_healthdash) --
# Previously ran as a standalone service on port 20855.
# Now built into the gateway via health_module.py.
healthdash:
  app:
    refresh_seconds: 5
    check_interval_seconds: 10
    request_timeout_seconds: 7
    client_id: "Health Check"

  # Map location slugs → friendly names shown on health dashboard
  tablet_names:
    chapel: "Chapel Tablet"
    social-hall: "Social Hall Tablet"
    av-room: "A/V Room Tablet"
    conf-room: "Conference Room Tablet"
    gym: "Gym Tablet"
    lobby: "Lobby Tablet"
    office: "Office Tablet"
    test: "Test Device"
    pc: "PC"
    admin: "Admin"
    # Backwards compat: old-style keys (until all tablets are migrated)
    Tablet_Mainchurch: "Main Church Tablet"
    Tablet_Chapel: "Chapel Tablet"
    Tablet_SocialHall: "Social Hall Tablet"
    Tablet_ConferenceRoom: "Conference Room Tablet"
    Tablet_Gym: "Gym Tablet"
    Tablet_Lobby: "Lobby Tablet"
    Tablet_Office: "Office Tablet"

  home_assistant:
    base_url: ""                       # Set HA_URL in .env (reuses gateway HA config)
    token: ""                          # Set HA_TOKEN in .env
    verify_tls: true

  alerts:
    ha_webhook_url: ""                 # Set HEALTHDASH_WEBHOOK_URL in .env
    defaults:
      enabled: true
      warn_after_seconds: 30
      down_after_seconds: 60
      cooldown_seconds: 300

  security:
    trusted_ip_prefixes:
      - "192.168.1."
      - "10.100."
      - "10.10."
      - "172.16."
      - "127.0.0.1"
      - "47.150."

  services:
    - id: "x32_middleware"
      name: "x32 Flask Middleware (Audio)"
      group: "Core"
      type: "http_json"
      url: "http://127.0.0.1:3400/health"
      ok_json_path: "healthy"
      ok_json_value: true
      detail_json_paths:
        Scene: "cur_scene"
        Scene Name: "cur_scene_name"
      warn_if_ms_gt: 5500
      poll_interval_seconds: 120
      timeout_seconds: 20
      log_path: ""                     # Set to local log path on server
      alert:
        enabled: false
      recovery:
        type: "ha_service"
        domain: "script"
        service: "turn_on"
        service_data:
          entity_id: "script.restart_x32_middleware"

    - id: "moip_middleware"
      name: "MoIP Flask Middleware (Video)"
      group: "Core"
      type: "http_json"
      url: "http://127.0.0.1:5002/status"
      ok_json_path: "healthy"
      ok_json_value: true
      warn_if_ms_gt: 500
      timeout_seconds: 10
      log_path: ""
      recovery:
        type: "ha_service"
        domain: "script"
        service: "turn_on"
        service_data:
          entity_id: "script.restart_moip_middleware"

    - id: "obs"
      name: "OBS Flask Middleware (Live Stream)"
      group: "Core"
      type: "obs_rpc"
      base_url: "http://127.0.0.1:4456"
      timeout_seconds: 5
      log_path: ""
      alert:
        enabled: true
        warn_after_seconds: 180
        down_after_seconds: 360
        cooldown_seconds: 300
      recovery:
        type: "ha_service"
        domain: "script"
        service: "turn_on"
        service_data:
          entity_id: "script.restart_obs_middleware"

    - id: "stp_gateway"
      name: "STP Gateway (Control Panel)"
      group: "Core"
      type: "http_json"
      url: "http://127.0.0.1:20858/api/health"
      ok_json_path: "healthy"
      ok_json_value: true
      detail_json_paths:
        Version: "version"
        Mock Mode: "mock_mode"
      warn_if_ms_gt: 2000
      timeout_seconds: 5
      show_standalone: true
      alert:
        enabled: true
        warn_after_seconds: 60
        down_after_seconds: 120
        cooldown_seconds: 300

    - id: "home_assistant"
